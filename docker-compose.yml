name: d4u-mvp
services:
  postgres:
    image: postgres:16-alpine
    container_name: d4u-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?Set POSTGRES_DB in .env}"
      POSTGRES_USER: "${POSTGRES_USER:?Set POSTGRES_USER in .env}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - d4u_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: D4U.Api/Dockerfile
    container_name: d4u-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      D4U_APPLY_MIGRATIONS: "true"
      D4U_DATABASE_CONNECTION: "Host=postgres;Port=5432;Database=${POSTGRES_DB:?Set POSTGRES_DB in .env};Username=${POSTGRES_USER:?Set POSTGRES_USER in .env};Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
      Uploads__RootPath: "${UPLOADS_ROOT_PATH:-}"
      Jwt__Issuer: "${JWT_ISSUER:?Set JWT_ISSUER in .env}"
      Jwt__Audience: "${JWT_AUDIENCE:?Set JWT_AUDIENCE in .env}"
      Jwt__SigningKey: "${JWT_SIGNING_KEY:?Set JWT_SIGNING_KEY in .env}"
      Admin__Email: "${ADMIN_EMAIL:-}"
      Admin__Username: "${ADMIN_USERNAME:-admin}"
      Admin__Password: "${ADMIN_PASSWORD:-}"
      Admin__FullName: "${ADMIN_FULL_NAME:-D4U Admin}"
      Ai__Provider: "${AI_PROVIDER:-Mock}"
      Ai__ApiKey: "${AI_API_KEY:-}"
      Ai__Model: "${AI_MODEL:-gpt-5-mini}"
      Ai__TimeoutSeconds: "${AI_TIMEOUT_SECONDS:-30}"
      Ai__FallbackToMock: "${AI_FALLBACK_TO_MOCK:-true}"
      Ai__BaseUrl: "${AI_BASE_URL:-https://api.openai.com/v1}"
      Payment__Provider: "${PAYMENT_PROVIDER:-PayOS}"
      Payment__ReturnUrl: "${PAYMENT_RETURN_URL:-http://localhost:3000/payment/success}"
      Payment__CancelUrl: "${PAYMENT_CANCEL_URL:-http://localhost:3000/payment/cancel}"
      Payment__PayOS__ClientId: "${PAYMENT_PAYOS_CLIENT_ID:-}"
      Payment__PayOS__ApiKey: "${PAYMENT_PAYOS_API_KEY:-}"
      Payment__PayOS__ChecksumKey: "${PAYMENT_PAYOS_CHECKSUM_KEY:-}"
      Payment__PayOS__BaseUrl: "${PAYMENT_PAYOS_BASE_URL:-https://api-merchant.payos.vn}"
      GoogleAuth__ClientId: "${GOOGLE_AUTH_CLIENT_ID:-}"
      Email__SmtpHost: "${EMAIL_SMTP_HOST:-}"
      Email__SmtpPort: "${EMAIL_SMTP_PORT:-587}"
      Email__Username: "${EMAIL_USERNAME:-}"
      Email__Password: "${EMAIL_PASSWORD:-}"
      Email__FromEmail: "${EMAIL_FROM_EMAIL:-}"
      Email__FromName: "${EMAIL_FROM_NAME:-D4U}"
      Email__UseSsl: "${EMAIL_USE_SSL:-true}"
      UserEmailVerification__CodeExpiresMinutes: "${USER_EMAIL_CODE_EXPIRES_MINUTES:-15}"
      UserEmailVerification__CodeLength: "${USER_EMAIL_CODE_LENGTH:-6}"
      StudentEmailVerification__AllowedDomains__0: "${STUDENT_EMAIL_ALLOWED_DOMAIN_0:-edu}"
      StudentEmailVerification__AllowedDomains__1: "${STUDENT_EMAIL_ALLOWED_DOMAIN_1:-edu.vn}"
      StudentEmailVerification__CodeExpiresMinutes: "${STUDENT_EMAIL_CODE_EXPIRES_MINUTES:-15}"
      StudentEmailVerification__CodeLength: "${STUDENT_EMAIL_CODE_LENGTH:-6}"
      StudentEmailVerification__IncludeCodeInResponseForDevelopment: "${STUDENT_EMAIL_INCLUDE_CODE_IN_RESPONSE:-true}"
      DataProtection__KeysPath: "/app/App_Data/data-protection-keys"
    ports:
      - "127.0.0.1:${D4U_API_PORT:-8080}:8080"
    volumes:
      - d4u_uploads:/app/App_Data/uploads
      - d4u_data_protection_keys:/app/App_Data/data-protection-keys
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./FE
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: "${GOOGLE_AUTH_CLIENT_ID:-}"
    container_name: d4u-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${D4U_FRONTEND_PORT:-3000}:80"
    depends_on:
      - api

volumes:
  d4u_postgres_data:
  d4u_uploads:
  d4u_data_protection_keys:
